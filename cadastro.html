<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro | Raízes do Nordeste</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <div class="foodtech-container">
        <div class="foodtech-content">
            
            <div class="foodtech-text">
                <h1 class="giant-title">Bora fazer parte<br><span class="highlight">da família?</span></h1>
                <p class="subtitle">Crie sua conta para acumular pontos e saborear o melhor do Nordeste.</p>

                <form id="register-form" class="minimal-form">
                    <div class="input-group">
                        <input type="text" id="reg-nome" required placeholder=" ">
                        <label for="reg-nome">Nome Completo</label>
                    </div>

                    <div class="input-group">
                        <input type="email" id="reg-email" required placeholder=" ">
                        <label for="reg-email">E-mail</label>
                    </div>
                    
                    <div class="input-group">
                        <input type="password" id="reg-senha" required placeholder=" ">
                        <label for="reg-senha">Senha</label>
                    </div>

                    <div class="input-group">
                        <input type="password" id="reg-confirmar-senha" required placeholder=" ">
                        <label for="reg-confirmar-senha">Confirmar Senha</label>
                    </div>

                    <button type="submit" class="btn btn-full btn-foodtech">Cadastrar 🌵</button>

                    <div class="register-link">
                        <p>Já tem uma conta? <a href="index.html">Faça login</a></p>
                    </div>
                </form>
            </div>

            <div class="foodtech-visual">
                <img src="img/sarapatel.jpg" alt="Sarapatel" class="float-img img-1">
                <img src="img/baiao de dois.jpg" alt="Baiao de Dois" class="float-img img-2">
                <img src="img/macaxeira.jpg" alt="Macaxeira" class="float-img img-3">
            </div>

        </div>
    </div>

    <script src="js/mock.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
