<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Raízes do Nordeste | O verdadeiro sabor do Sertão</title>
  
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>

  <div class="split-left">
    <h1>🌵 Raízes do Nordeste</h1>
    <p>O tempero arretado que você respeita. Peça pelo Totem, App ou Web!</p>
    <div class="badges">
      <span class="badge">🛡️ LGPD</span>
      <span class="badge">📱 Multi-Canal</span>
      <span class="badge">⭐ Fidelidade</span>
    </div>
  </div>

  <div class="split-right">
    <div class="form-container">
      <h2>Acessar Conta</h2>
      <form id="login-form">
        <input type="email" placeholder="Seu e-mail">
        <input type="password" placeholder="Sua senha">
        <button type="submit" class="btn">Entrar</button>
      </form>
    </div>
    </div>

  <script src="js/mock.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
