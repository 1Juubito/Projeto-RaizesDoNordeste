<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Raízes do Nordeste | Início</title>
  
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <div class="foodtech-container">
        <div class="foodtech-content">
            
            <div class="foodtech-text">
                <h1 class="giant-title">O Nordeste<br><span class="highlight">a um clique</span><br>da sua fome.</h1>
                <p class="subtitle">Acesse sua conta para pedir os melhores pratos da região.</p>

              <form id="login-form" class="minimal-form">
                    <div class="input-group">
                        <input type="email" id="email" required placeholder=" ">
                        <label for="email">E-mail</label>
                    </div>
                    
                    <div class="input-group">
                        <input type="password" id="senha" required placeholder=" ">
                        <label for="senha">Senha</label>
                    </div>

                    <div class="forgot-password">
                        <a href="#">Esqueci minha senha</a>
                    </div>

                    <button type="submit" class="btn btn-full btn-foodtech">Entrar 🌵</button>

                    <div class="register-link">
                        <p>Não tem uma conta? <a href="cadastro.html">Cadastre-se</a></p>
                    </div>
                </form>
            </div>

            <div class="foodtech-visual">
                <img src="https://cdn-icons-png.flaticon.com/512/3274/3274099.png" alt="Prato Principal" class="float-img img-1">
                <img src="https://cdn-icons-png.flaticon.com/512/2722/2722086.png" alt="Pimenta" class="float-img img-2">
                <img src="https://cdn-icons-png.flaticon.com/512/1206/1206263.png" alt="Bebida" class="float-img img-3">
            </div>

        </div>
    </div>

    <script src="js/mock.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
