<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acompanhamento | Raízes do Nordeste</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
  <style>
    .tracker { display: flex; justify-content: space-between; margin: 3rem 0; position: relative; }
    .tracker::before { content: ''; position: absolute; top: 15px; left: 0; right: 0; height: 4px; background: #eee; z-index: 1; }
    .step { text-align: center; position: relative; z-index: 2; width: 25%; }
    .step .circle { width: 34px; height: 34px; background: #eee; border-radius: 50%; margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #999; border: 4px solid var(--white); transition: 0.3s; }
    .step.active .circle { background: var(--primary); color: var(--white); }
    .step.completed .circle { background: #27ae60; color: var(--white); }
    .step p { font-size: 0.9rem; color: #666; font-weight: bold; }
    .step.active p { color: var(--primary); }
    .step.completed p { color: #27ae60; }
  </style>
</head>
<body>
  <div class="page-wrapper">
    <header class="header">
      <h2>🌱 Raízes do Nordeste</h2>
      <nav>
        <a href="unidades.html">📍 Unidades</a>
        <a href="cardapio.html">🍽️ Cardápio</a>
        <a href="carrinho.html">🛒 Carrinho</a>
        <a href="fidelidade.html">⭐ Fidelidade</a>
        <a href="index.html" onclick="localStorage.removeItem('raizes_currentUser')">Sair</a>
      </nav>
    </header>

    <div class="form-container" style="max-width: 800px; margin: 0 auto;">
      <h2 style="text-align: center;">Acompanha o teu Pedido</h2>
      <p style="text-align: center; font-size: 1.2rem;">Pedido nº <strong id="order-id-display" style="color: var(--primary);">...</strong></p>

      <div class="tracker">
        <div class="step" id="step-recebido">
          <div class="circle">1</div>
          <p>Recebido</p>
        </div>
        <div class="step" id="step-preparo">
          <div class="circle">2</div>
          <p>Em Preparo</p>
        </div>
        <div class="step" id="step-pronto">
          <div class="circle">3</div>
          <p>Pronto</p>
        </div>
        <div class="step" id="step-entregue">
          <div class="circle">4</div>
          <p>Entregue</p>
        </div>
      </div>

      <div style="text-align: center; margin-top: 2rem;">
        <button onclick="window.location.href='cardapio.html'" class="btn" style="max-width: 200px;">Fazer novo pedido</button>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
        const urlParams = new URLSearchParams(window.location.search);
        const orderId = urlParams.get('id');
        
        if(orderId) {
            document.getElementById('order-id-display').textContent = orderId;
        }

        const states = ['recebido', 'preparo', 'pronto', 'entregue'];
        let currentState = 0;

        function updateTracker() {
            states.forEach((state, index) => {
                const stepElement = document.getElementById(`step-${state}`);
                stepElement.className = 'step';
                
                if (index < currentState) {
                    stepElement.classList.add('completed');
                } else if (index === currentState) {
                    stepElement.classList.add('active');
                }
            });
            
            if(currentState < states.length - 1) {
                currentState++;
                setTimeout(updateTracker, 5000); 
            }
        }

        updateTracker();
    });
  </script>
</body>
</html>
