<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acompanhamento | Raízes do Nordeste</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <div class="page-wrapper">
    <header class="header">
      <h2>🌱 Raízes do Nordeste</h2>
      <nav>
        <a href="unidades.html">📍 Unidades</a>
        <a href="cardapio.html">🍽️ Cardápio</a>
        <a href="carrinho.html">🛒 Carrinho</a>
        <a href="fidelidade.html">⭐ Fidelidade</a>
        <a href="index.html" onclick="localStorage.removeItem('raizes_currentUser')">Sair</a>
      </nav>
    </header>

    <div class="form-container">
      <h2>Acompanha o teu Pedido</h2>
      <p>...</strong></p>

      <div class="tracker">
        <div class="step" id="step-recebido">
          <div class="circle">1</div>
          <p>Recebido</p>
        </div>
        <div class="step" id="step-preparo">
          <div class="circle">2</div>
          <p>Em Preparo</p>
        </div>
        <div class="step" id="step-pronto">
          <div class="circle">3</div>
          <p>Pronto</p>
        </div>
        <div class="step" id="step-entregue">
          <div class="circle">4</div>
          <p>Entregue</p>
        </div>
      </div>

      <div>
        <button onclick="window.location.href='cardapio.html'" class="btn">Fazer novo pedido</button>
      </div>
    </div>
  </div>

  <script src="js/pedido.js"></script>
</body>
</body>
</html>
