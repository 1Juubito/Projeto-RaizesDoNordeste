<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pagamento | Raízes do Nordeste</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <div class="page-wrapper">
    <header class="header">
      <h2>🌱 Raízes do Nordeste</h2>
      <nav>
        <a href="unidades.html">📍 Unidades</a>
        <a href="cardapio.html">🍽️ Cardápio</a>
        <a href="carrinho.html">🛒 Carrinho</a>
        <a href="fidelidade.html">⭐ Fidelidade</a>
        <a href="index.html" onclick="localStorage.removeItem('raizes_currentUser')">Sair</a>
      </nav>
    </header>

    <div class="form-container">
      <h2>💳 Checkout Seguro</h2>
      <p>Ambiente de simulação para pagamento externo.</p>

      <form id="payment-form">
        <label>Número do Cartão de Crédito</label>
        <input type="text" value="4111 1111 1111 1111" readonly>
        
        <div>
          <div>
            <label>Validade</label>
            <input type="text" value="12/28" readonly>
          </div>
          <div>
            <label>CVV</label>
            <input type="text" value="123" readonly>
          </div>
        </div>

        <div class="lgpd-box">
          <label>
            <input type="checkbox" id="lgpd-consent" required>
            <span>Autorizo o processamento deste pagamento e confirmo que li a <strong>Política de Privacidade (LGPD)</strong>.</span>
          </label>
        </div>

        <button type="submit" class="btn">Confirmar Pagamento</button>
      </form>
    </div>
  </div>

  <script src="js/mock.js"></script>
  <script src="js/pagamento.js"></script>
</body>
</body>
</html>
