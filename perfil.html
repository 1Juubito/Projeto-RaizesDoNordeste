<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meu Perfil | Raízes do Nordeste</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <div class="page-wrapper">
    <header class="header">
        <h2>🌱 Raízes do Nordeste</h2>
        <nav>
            <a href="unidades.html">📍 Unidades</a>
            <a href="cardapio.html">🍽️ Cardápio</a>
            <a href="carrinho.html">🛒 Carrinho (<span id="cart-badge">0</span>)</a>
            <a href="fidelidade.html">⭐ Fidelidade</a>
            <a href="perfil.html" class="active">👤 Perfil</a>
            <a href="#" id="btn-logout">Sair</a>
        </nav>
    </header>

    <h1 class="page-title">Meus Dados</h1>

    <div class="profile-container">
      <form id="form-perfil" class="profile-form">
        
        <div class="form-group">
            <label for="perfil-nome">Nome Completo</label>
            <input type="text" id="perfil-nome" required>
        </div>

        <div class="form-group">
            <label for="perfil-email">E-mail (Login)</label>
            <input type="email" id="perfil-email" disabled>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="perfil-cpf">CPF</label>
                <input type="text" id="perfil-cpf" placeholder="000.000.000-00">
            </div>
            <div class="form-group">
                <label for="perfil-nascimento">Data de Nascimento</label>
                <input type="date" id="perfil-nascimento">
            </div>
        </div>

        <div class="form-group">
            <label for="perfil-telefone">Telefone / WhatsApp</label>
            <input type="tel" id="perfil-telefone" placeholder="(00) 00000-0000">
        </div>
        <hr class="security-divider">
        <h3 class="security-title">Segurança</h3>

        <div class="form-row">
            <div class="form-group">
                <label for="perfil-senha">Nova Senha (deixe em branco para manter)</label>
                <input type="password" id="perfil-senha" placeholder="Digite a nova senha">
            </div>
            <div class="form-group">
                <label for="perfil-confirma-senha">Confirmar Nova Senha</label>
                <input type="password" id="perfil-confirma-senha" placeholder="Repita a nova senha">
            </div>
        </div>

        <button type="submit" class="btn btn-full">Salvar Alterações</button>
        
      </form>
    </div>
  </div>

  <script src="js/mock.js"></script>
  <script src="js/app.js"></script> 
  <script src="js/perfil.js"></script> 
</body>
</html>
